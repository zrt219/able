<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Able</title>
    <link rel="canonical" href="https://ablemusic.vercel.app/contact" />
    <meta property="og:url" content="https://ablemusic.vercel.app/contact" />
    <link rel="icon" type="image/png" href="assets/logos/av-sunburst-logo-refined-navy.png" />
    <link rel="apple-touch-icon" href="assets/logos/av-sunburst-logo-refined-navy.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css?v=20260617-header-scroll" />
  </head>
  <body class="contact-page" data-theme="light">
    <div class="construction-notice" role="status" aria-live="polite">
      <span>Still under construction!</span>
      <button class="construction-close" type="button" aria-label="Close construction notice">X</button>
    </div>

    <header class="site-header" aria-label="Primary">
      <a class="brand" href="home" aria-label="Able home">
        <img
          class="brand-mark theme-image"
          src="assets/logos/av-sunburst-logo-refined-navy.png"
          data-dark-src="assets/logos/av-sunburst-logo-refined-cream.png"
          data-light-src="assets/logos/av-sunburst-logo-refined-navy.png"
          alt=""
        />
      </a>
      <nav class="main-nav" aria-label="Main navigation">
        <a href="home">Home</a>
        <a href="home#accolades-title">Listen</a>
        <a href="home#subscribe">Subscribe</a>
      </nav>
      <div class="header-actions">
        <button class="theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="true">
          <span class="toggle-track" aria-hidden="true"><span class="toggle-thumb"></span></span>
          <span class="theme-toggle-text">Dark</span>
        </button>
        <a class="outline-button" href="contact" aria-current="page">Contact</a>
      </div>
    </header>

    <main class="contact-main">
      <section class="contact-hero" aria-labelledby="contact-title">
        <p class="eyebrow">Inquiries</p>
        <h1 id="contact-title">Contact</h1>
        <p class="intro">
          For commissions, collaborations, or anything else.
        </p>
      </section>

      <section class="contact-shell" aria-label="Inquiry form">
        <form
          class="inquiry-form"
          action="https://formsubmit.co/ablecomposing@outlook.com"
          data-email-form
          data-ajax-action="https://formsubmit.co/ajax/ablecomposing@outlook.com"
          data-success-message="Sent. Thank you."
          data-error-message="Something went wrong. Please email ablecomposing@outlook.com."
          method="post"
        >
          <input type="hidden" name="_subject" value="New Able inquiry" />
          <input type="hidden" name="_template" value="table" />
          <input type="hidden" name="_captcha" value="false" />
          <input type="hidden" name="_next" value="https://ablemusic.vercel.app/thanks" />
          <input type="hidden" name="form_name" value="Contact inquiry" />
          <input class="form-honey" type="text" name="_honey" tabindex="-1" autocomplete="off" aria-hidden="true" />
          <div class="form-grid">
            <label>
              <span>Name</span>
              <input name="name" type="text" autocomplete="name" required />
            </label>
            <label>
              <span>Email</span>
              <input name="email" type="email" autocomplete="email" required />
            </label>
          </div>
          <label>
            <span>Inquiry type</span>
            <select name="inquiry" required>
              <option value="">Select one</option>
              <option>Commission</option>
              <option>Programming</option>
              <option>Collaboration</option>
              <option>General</option>
            </select>
          </label>
          <label>
            <span>Message</span>
            <textarea name="message" rows="7" required></textarea>
          </label>
          <button type="submit">Send Inquiry</button>
          <p class="form-status" role="status" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="site.js?v=piece-access"></script>
  </body>
</html>
